services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=umeter
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-umeter}
      - POSTGRES_DB=umeter
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umeter"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
