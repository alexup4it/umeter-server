services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umeter
      POSTGRES_USER: umeter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umeter -d umeter"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://umeter:${POSTGRES_PASSWORD}@postgres:5432/umeter
      HMAC_SECRET: ${HMAC_SECRET:?Set HMAC_SECRET in .env}
      FIRMWARE_DIR: /app/firmware
    volumes:
      - firmware:/app/firmware
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  firmware:
